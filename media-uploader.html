<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>メディア変換・GitHub登録</title>
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
<style>
:root{--bg:#f2efe9;--surface:#fff;--raised:#f7f5f1;--border:#ded7cc;--text:#1a1814;--muted:#6a6258;--dim:#9b9285;--red:#b83232;--red-l:#fff0f0;--blue:#2a5a8a;--blue-l:#eff6ff;--green:#276738;--green-l:#effaf2;--gold:#8a6a2a;--shadow:0 2px 10px rgba(32,25,16,.08);--sans:'Segoe UI','Noto Sans JP',sans-serif;--mono:'Cascadia Mono','Consolas',monospace}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh}.header{height:58px;background:var(--surface);border-bottom:2px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:12px;position:sticky;top:0;z-index:10}.brand{font-weight:700;font-size:15px;display:flex;align-items:center;gap:9px}.brand-icon{width:30px;height:30px;border-radius:6px;background:var(--red);color:#fff;display:grid;place-items:center}.header-note{color:var(--dim);font-size:11px}.spacer{flex:1}.status{font-size:11px;color:var(--muted);max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.status.ok{color:var(--green)}.status.err{color:var(--red)}.layout{display:grid;grid-template-columns:300px minmax(0,1fr);min-height:calc(100vh - 58px)}.settings{background:var(--surface);border-right:1px solid var(--border);padding:18px;overflow:auto}.workspace{padding:20px;min-width:0}.section-title{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.08em;margin:0 0 12px}.field{margin-bottom:12px}.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}.field small{display:block;color:var(--dim);font-size:9px;line-height:1.5;margin-top:3px}.input,.select{width:100%;border:1.5px solid var(--border);border-radius:5px;background:var(--raised);color:var(--text);font:12px var(--mono);padding:8px 9px;outline:none}.input:focus,.select:focus{border-color:var(--blue);background:#fff}.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.divider{height:1px;background:var(--border);margin:18px 0}.btn{border:1.5px solid var(--border);border-radius:6px;background:#fff;color:var(--text);padding:8px 13px;font:600 12px var(--sans);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap}.btn:hover{border-color:var(--text)}.btn:disabled{opacity:.45;cursor:not-allowed}.btn-primary{background:var(--red);border-color:var(--red);color:#fff}.btn-blue{background:var(--blue);border-color:var(--blue);color:#fff}.btn-green{background:var(--green-l);border-color:var(--green);color:var(--green)}.btn-full{width:100%}.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px;gap:2px}.tab{border:0;border-bottom:3px solid transparent;background:transparent;color:var(--muted);font:600 13px var(--sans);padding:10px 18px;cursor:pointer}.tab.active{color:var(--red);border-bottom-color:var(--red)}.panel{display:none}.panel.active{display:block}.work-grid{display:grid;grid-template-columns:minmax(280px,420px) minmax(320px,1fr);gap:22px;align-items:start}.drop{border:2px dashed var(--border);background:rgba(255,255,255,.55);min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;cursor:pointer;border-radius:7px}.drop:hover,.drop.drag{border-color:var(--blue);background:var(--blue-l)}.drop-icon{font-size:32px;margin-bottom:9px}.drop strong{font-size:13px}.drop span{font-size:10px;color:var(--dim);margin-top:5px}.drop input{display:none}.tool-fields{margin-top:14px}.inline{display:flex;gap:8px;align-items:end}.inline .field{flex:1}.mode-buttons{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--border);border-radius:6px;overflow:hidden}.mode-btn{border:0;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:#fff;padding:8px 5px;color:var(--muted);font:600 11px var(--sans);cursor:pointer}.mode-btn:nth-child(3n){border-right:0}.mode-btn:nth-last-child(-n+3){border-bottom:0}.mode-btn.active{background:var(--blue);color:#fff}.preview{background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:7px;overflow:hidden}.preview-head{padding:11px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--muted);display:flex;align-items:center}.preview-body{padding:16px}.image-preview{width:100%;max-height:360px;object-fit:contain;background:#eee;display:none}.audio-preview{width:100%;display:none}.result{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}.result-row{margin-bottom:11px}.result-label{font-size:10px;color:var(--dim);font-weight:600;margin-bottom:4px}.result-value{font:11px var(--mono);background:var(--raised);border:1px solid var(--border);padding:8px;border-radius:5px;word-break:break-all;min-height:34px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.progress{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:12px;display:none}.progress-bar{height:100%;width:40%;background:var(--blue);animation:move 1s infinite alternate}@keyframes move{to{transform:translateX(150%)}}.notice{font-size:10px;line-height:1.6;color:var(--muted);background:var(--raised);border-left:3px solid var(--gold);padding:9px 10px;margin-top:12px}.hidden{display:none!important}@media(max-width:920px){.layout{grid-template-columns:1fr}.settings{border-right:0;border-bottom:1px solid var(--border)}.work-grid{grid-template-columns:1fr}.header-note{display:none}}@media(max-width:560px){.workspace,.settings{padding:13px}.header{padding:0 10px}.status{display:none}.mode-buttons{grid-template-columns:repeat(2,1fr)}.mode-btn:nth-child(n){border-right:1px solid var(--border);border-bottom:1px solid var(--border)}.mode-btn:nth-child(2n){border-right:0}.mode-btn:nth-last-child(-n+2){border-bottom:0}}
</style>
</head>
<body>
<header class="header">
  <div class="brand"><span class="brand-icon">⇧</span>メディア変換・GitHub登録</div>
  <div class="header-note">画像・音声を変換して公開URLまで作成</div>
  <div class="spacer"></div><div id="status" class="status">設定とファイルを選択してください</div>
</header>
<main class="layout">
  <aside class="settings">
    <h2 class="section-title">GITHUB接続</h2>
    <div class="field"><label>アクセストークン</label><input id="token" class="input" type="password" autocomplete="off" placeholder="github_pat_..."><small>このタブを閉じると消去されます。HTMLには保存しません。</small></div>
    <div class="field"><label>GitHubユーザー名</label><input id="owner" class="input" placeholder="Kosa-E-Mon"></div>
    <div class="field"><label>ブランチ</label><input id="branch" class="input" value="main"></div>
    <div class="divider"></div>
    <h2 class="section-title">画像の保存先</h2>
    <div class="field"><label>リポジトリ</label><input id="image-repo" class="input" placeholder="images"></div>
    <div class="field"><label>フォルダ</label><input id="image-folder" class="input" placeholder="spots"></div>
    <div class="field"><label>Pages基準URL（任意）</label><input id="image-pages" class="input" placeholder="https://kosa-e-mon.github.io/images/"></div>
    <div class="divider"></div>
    <h2 class="section-title">音声の保存先</h2>
    <div class="field"><label>リポジトリ</label><input id="audio-repo" class="input" placeholder="audio"></div>
    <div class="field"><label>フォルダ</label><input id="audio-folder" class="input" placeholder="voice"></div>
    <div class="field"><label>Pages基準URL（任意）</label><input id="audio-pages" class="input" placeholder="https://kosa-e-mon.github.io/audio/"></div>
    <button class="btn btn-green btn-full" onclick="saveSettings()">設定を端末に保存</button>
    <div class="notice">GitHubのFine-grained tokenには、対象リポジトリの「Contents: Read and write」権限が必要です。</div>
  </aside>
  <section class="workspace">
    <div class="tabs"><button id="tab-image" class="tab active" onclick="showTab('image')">画像 → WebP</button><button id="tab-audio" class="tab" onclick="showTab('audio')">WAV → MP3</button></div>

    <div id="panel-image" class="panel active">
      <div class="work-grid">
        <div>
          <label class="drop" id="image-drop"><input id="image-file" type="file" accept="image/jpeg,image/png"><span class="drop-icon">▧</span><strong>JPEG・PNGを選択</strong><span>ここへドラッグ＆ドロップもできます</span></label>
          <div class="tool-fields">
            <div class="field"><label>画像ID・基本ファイル名</label><input id="image-id" class="input" placeholder="spot_012"></div>
            <div class="settings-grid"><div class="field"><label>連番（任意）</label><input id="image-seq" class="input" placeholder="02"></div><div class="field"><label>最大幅 px</label><input id="image-width" class="input" type="number" value="1600" min="320" max="5000"></div></div>
            <div class="field"><label>WebP品質 <span id="quality-label">82</span>%</label><input id="image-quality" type="range" min="40" max="100" value="82" style="width:100%"></div>
            <button id="image-convert" class="btn btn-primary btn-full" onclick="convertImage()" disabled>WebPに変換</button>
          </div>
        </div>
        <div class="preview"><div class="preview-head">変換結果</div><div class="preview-body"><img id="image-preview" class="image-preview" alt="変換画像"><div id="image-result" class="result hidden"></div></div></div>
      </div>
    </div>

    <div id="panel-audio" class="panel">
      <div class="work-grid">
        <div>
          <label class="drop" id="audio-drop"><input id="audio-file" type="file" accept="audio/wav,.wav"><span class="drop-icon">♫</span><strong>WAVファイルを選択</strong><span>ここへドラッグ＆ドロップもできます</span></label>
          <div class="tool-fields">
            <div class="field"><label>スポットID</label><input id="audio-id" class="input" placeholder="spot_012"></div>
            <div class="field"><label>音声の用途</label><div class="mode-buttons" id="audio-modes">
              <button class="mode-btn active" data-mode="start">スタート</button><button class="mode-btn" data-mode="approach">接近</button><button class="mode-btn" data-mode="arrive">到着</button>
              <button class="mode-btn" data-mode="explain">解説</button><button class="mode-btn" data-mode="next">次へ</button><button class="mode-btn" data-mode="goal">ゴール</button>
            </div></div>
            <div class="field"><label>MP3ビットレート</label><select id="audio-bitrate" class="select"><option value="96">96 kbps</option><option value="128" selected>128 kbps</option><option value="192">192 kbps</option></select></div>
            <button id="audio-convert" class="btn btn-primary btn-full" onclick="convertAudio()" disabled>MP3に変換</button>
          </div>
        </div>
        <div class="preview"><div class="preview-head">変換結果</div><div class="preview-body"><audio id="audio-preview" class="audio-preview" controls></audio><div id="audio-result" class="result hidden"></div><div id="audio-progress" class="progress"><div class="progress-bar"></div></div></div></div>
      </div>
    </div>
  </section>
</main>
<script>
'use strict';
const SETTINGS_KEY='media_uploader_settings_v1';
let activeTab='image',audioMode='start',sourceImage=null,sourceAudio=null;
let imageOutput=null,audioOutput=null,dirty=false,allowLeave=false;

function $(id){return document.getElementById(id)}
function setStatus(message,type=''){const el=$('status');el.textContent=message;el.className='status '+type}
function sanitizeName(value){return String(value||'').trim().replace(/\.[^.]+$/,'').replace(/[\\/:*?"<>|#%]/g,'_').replace(/\s+/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'')}
function joinPath(folder,name){return [String(folder||'').replace(/^\/+|\/+$/g,''),name].filter(Boolean).join('/')}
function encodePath(path){return path.split('/').map(encodeURIComponent).join('/')}
function formatBytes(n){if(n<1024)return n+' B';if(n<1048576)return (n/1024).toFixed(1)+' KB';return (n/1048576).toFixed(2)+' MB'}

function showTab(kind){activeTab=kind;['image','audio'].forEach(k=>{$('tab-'+k).classList.toggle('active',k===kind);$('panel-'+k).classList.toggle('active',k===kind)})}
function saveSettings(){const data={};['owner','branch','image-repo','image-folder','image-pages','audio-repo','audio-folder','audio-pages'].forEach(id=>data[id]=$(id).value.trim());localStorage.setItem(SETTINGS_KEY,JSON.stringify(data));sessionStorage.setItem('media_uploader_token',$('token').value);setStatus('設定を保存しました','ok')}
function loadSettings(){try{const data=JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}');Object.entries(data).forEach(([id,v])=>{if($(id))$(id).value=v})}catch(e){}
// エディタから開いた場合はURLパラメータの設定(configのphoto_repo/audio_repo由来)を優先
const q=new URLSearchParams(location.search);
if(q.get('owner'))$('owner').value=q.get('owner');
if(q.get('image_repo'))$('image-repo').value=q.get('image_repo');
if(q.get('audio_repo'))$('audio-repo').value=q.get('audio_repo');
$('token').value=sessionStorage.getItem('media_uploader_token')||''}

function bindDrop(kind,accept){const input=$(kind+'-file'),drop=$(kind+'-drop');input.addEventListener('change',()=>selectFile(kind,input.files[0]));['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag')}));['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag')}));drop.addEventListener('drop',e=>{const file=e.dataTransfer.files[0];if(file&&accept(file))selectFile(kind,file);else setStatus('対応していないファイル形式です','err')})}
function selectFile(kind,file){if(!file)return;dirty=true;if(kind==='image'){sourceImage=file;$('image-convert').disabled=false;if(!$('image-id').value)$('image-id').value=sanitizeName(file.name);setStatus(`${file.name} を選択しました`)}else{sourceAudio=file;$('audio-convert').disabled=false;if(!$('audio-id').value){const base=sanitizeName(file.name).replace(/_(start|approach|arrive|explain|next|goal)$/i,'');$('audio-id').value=base}setStatus(`${file.name} を選択しました`)}}

async function convertImage(){const id=sanitizeName($('image-id').value);if(!sourceImage||!id){setStatus('画像と画像IDを指定してください','err');return}setStatus('WebPへ変換しています…');try{const bitmap=await createImageBitmap(sourceImage);const maxWidth=Math.max(320,Number($('image-width').value)||1600);const scale=Math.min(1,maxWidth/bitmap.width);const canvas=document.createElement('canvas');canvas.width=Math.round(bitmap.width*scale);canvas.height=Math.round(bitmap.height*scale);canvas.getContext('2d').drawImage(bitmap,0,0,canvas.width,canvas.height);const quality=(Number($('image-quality').value)||82)/100;const blob=await new Promise((resolve,reject)=>canvas.toBlob(b=>b?resolve(b):reject(new Error('WebP変換に失敗しました')),'image/webp',quality));const seq=sanitizeName($('image-seq').value);const filename=id+(seq?'_'+seq:'')+'.webp';imageOutput={blob,filename,kind:'image'};$('image-preview').src=URL.createObjectURL(blob);$('image-preview').style.display='block';renderResult('image',imageOutput,`${bitmap.width}×${bitmap.height} → ${canvas.width}×${canvas.height} / ${formatBytes(blob.size)}`);setStatus('WebPへの変換が完了しました','ok')}catch(e){setStatus(e.message||'画像変換に失敗しました','err')}}

async function convertAudio(){const id=sanitizeName($('audio-id').value);if(!sourceAudio||!id){setStatus('WAVファイルとスポットIDを指定してください','err');return}if(typeof lamejs==='undefined'){setStatus('MP3変換ライブラリを読み込めませんでした。通信状態を確認してください','err');return}$('audio-progress').style.display='block';$('audio-convert').disabled=true;setStatus('WAVをMP3へ変換しています…');try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const decoded=await ctx.decodeAudioData(await sourceAudio.arrayBuffer());const channels=Math.min(2,decoded.numberOfChannels);const sampleRate=44100;let buffer=decoded;if(decoded.sampleRate!==sampleRate){const offline=new OfflineAudioContext(channels,Math.ceil(decoded.duration*sampleRate),sampleRate);const src=offline.createBufferSource();src.buffer=decoded;src.connect(offline.destination);src.start();buffer=await offline.startRendering()}const encoder=new lamejs.Mp3Encoder(channels,sampleRate,Number($('audio-bitrate').value)||128);const left=floatTo16(buffer.getChannelData(0));const right=channels===2?floatTo16(buffer.getChannelData(1)):null;const chunks=[];for(let i=0;i<left.length;i+=1152){const data=channels===2?encoder.encodeBuffer(left.subarray(i,i+1152),right.subarray(i,i+1152)):encoder.encodeBuffer(left.subarray(i,i+1152));if(data.length)chunks.push(new Int8Array(data))}const end=encoder.flush();if(end.length)chunks.push(new Int8Array(end));const blob=new Blob(chunks,{type:'audio/mpeg'});const filename=`${id}_${audioMode}.mp3`;audioOutput={blob,filename,kind:'audio'};$('audio-preview').src=URL.createObjectURL(blob);$('audio-preview').style.display='block';renderResult('audio',audioOutput,`${decoded.duration.toFixed(1)}秒 / ${formatBytes(blob.size)}`);await ctx.close();setStatus('MP3への変換が完了しました','ok')}catch(e){console.error(e);setStatus('音声変換に失敗しました。PCM形式のWAVを確認してください','err')}finally{$('audio-progress').style.display='none';$('audio-convert').disabled=false}}
function floatTo16(values){const out=new Int16Array(values.length);for(let i=0;i<values.length;i++){const v=Math.max(-1,Math.min(1,values[i]));out[i]=v<0?v*32768:v*32767}return out}

function renderResult(kind,output,detail){const box=$(kind+'-result');box.classList.remove('hidden');box.innerHTML='';const filename=row('ファイル名',output.filename);const info=row('変換情報',detail);const url=row('公開URL','GitHubへ登録すると表示されます','public-url-'+kind);const actions=document.createElement('div');actions.className='actions';const download=button('↓ 端末に保存','btn',()=>downloadOutput(kind));const upload=button('⇧ GitHubへ登録','btn btn-blue',()=>uploadOutput(kind));const copy=button('URLをコピー','btn btn-green',()=>copyPublicUrl(kind));copy.id='copy-url-'+kind;copy.disabled=true;actions.append(download,upload,copy);box.append(filename,info,url,actions)}
function row(label,value,id=''){const wrap=document.createElement('div');wrap.className='result-row';const l=document.createElement('div');l.className='result-label';l.textContent=label;const v=document.createElement('div');v.className='result-value';v.textContent=value;if(id)v.id=id;wrap.append(l,v);return wrap}
function button(label,cls,fn){const b=document.createElement('button');b.className=cls;b.textContent=label;b.onclick=fn;return b}
function downloadOutput(kind){const output=kind==='image'?imageOutput:audioOutput;if(!output)return;const a=document.createElement('a');a.href=URL.createObjectURL(output.blob);a.download=output.filename;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);setStatus(`${output.filename} を保存しました`,'ok')}

async function uploadOutput(kind){const output=kind==='image'?imageOutput:audioOutput;if(!output)return;const token=$('token').value.trim(),owner=$('owner').value.trim(),branch=$('branch').value.trim()||'main';const repo=$(kind+'-repo').value.trim(),folder=$(kind+'-folder').value.trim();if(!token||!owner||!repo){setStatus('トークン・ユーザー名・リポジトリを入力してください','err');return}saveSettings();const path=joinPath(folder,output.filename);const endpoint=`https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/${encodePath(path)}`;const headers={'Accept':'application/vnd.github+json','Authorization':`Bearer ${token}`,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'};setStatus('GitHubへ登録しています…');try{let sha=null;const existing=await fetch(endpoint+'?ref='+encodeURIComponent(branch),{headers});if(existing.ok){sha=(await existing.json()).sha}else if(existing.status!==404){throw new Error(await githubError(existing))}const bytes=new Uint8Array(await output.blob.arrayBuffer());const content=bytesToBase64(bytes);const payload={message:`Upload ${output.filename}`,content,branch};if(sha)payload.sha=sha;const response=await fetch(endpoint,{method:'PUT',headers,body:JSON.stringify(payload)});if(!response.ok)throw new Error(await githubError(response));const publicUrl=makePagesUrl(kind,owner,repo,path);$('public-url-'+kind).textContent=publicUrl;$('copy-url-'+kind).disabled=false;$('copy-url-'+kind).dataset.url=publicUrl;dirty=false;setStatus(`${output.filename} をGitHubへ登録しました`,'ok')}catch(e){setStatus(e.message||'GitHubへの登録に失敗しました','err')}}
function bytesToBase64(bytes){let binary='';const size=0x8000;for(let i=0;i<bytes.length;i+=size)binary+=String.fromCharCode(...bytes.subarray(i,i+size));return btoa(binary)}
async function githubError(response){try{const data=await response.json();return `GitHub: ${data.message||response.status}`}catch(e){return `GitHub: HTTP ${response.status}`}}
function makePagesUrl(kind,owner,repo,path){let base=$(kind+'-pages').value.trim();if(!base)base=`https://${owner}.github.io/${repo}/`;return base.replace(/\/+$/,'')+'/'+encodePath(path)}
async function copyPublicUrl(kind){const url=$('copy-url-'+kind).dataset.url;if(!url)return;try{await navigator.clipboard.writeText(url)}catch(e){const area=document.createElement('textarea');area.value=url;document.body.appendChild(area);area.select();document.execCommand('copy');area.remove()}setStatus('公開URLをコピーしました','ok')}

function setupGuard(){history.replaceState({mediaBase:true},'',location.href);history.pushState({mediaGuard:true},'',location.href);window.addEventListener('popstate',()=>{if(allowLeave){history.back();return}if(!dirty||confirm('変換・登録途中の内容があります。このページを離れますか？')){allowLeave=true;history.back()}else history.pushState({mediaGuard:true},'',location.href)});window.addEventListener('beforeunload',e=>{if(!dirty||allowLeave)return;e.preventDefault();e.returnValue=''})}

$('image-quality').addEventListener('input',()=>$('quality-label').textContent=$('image-quality').value);
$('audio-modes').addEventListener('click',e=>{const btn=e.target.closest('[data-mode]');if(!btn)return;audioMode=btn.dataset.mode;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b===btn))});
bindDrop('image',f=>/^image\/(jpeg|png)$/i.test(f.type));bindDrop('audio',f=>/\.wav$/i.test(f.name)||/audio\/(wav|x-wav)/i.test(f.type));loadSettings();setupGuard();
</script>
</body>
</html>
